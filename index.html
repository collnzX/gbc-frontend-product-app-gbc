<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Product App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="hero">
        <div class="hero-content">
            <h1>Azure Product App</h1>
            <p>A cloud-based multi-tier web application using Azure Static Web Apps, Azure Functions, and Azure SQL Database.</p>
            <button id="refreshBtn">Refresh Products</button>
        </div>
    </header>

    <main class="container">
        <section class="status-section">
            <p id="statusMessage">Loading products...</p>
        </section>

        <section>
            <h2>Available Products</h2>
            <div id="productGrid" class="product-grid"></div>
        </section>
    </main>

    <footer class="footer">
        <p>Built for a cloud project using Azure services.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
